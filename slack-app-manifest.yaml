# Slack app manifest for LowEffortLinkedIn.
#
# Before pasting this into https://api.slack.com/apps → "Create New App" →
# "From a manifest", replace every occurrence of YOUR-APP.up.railway.app with
# your real Railway public domain (docs/SETUP.md step 1 gets you that domain).
#
# Scopes and commands match docs/PLAN.md §6.

display_information:
  name: LowEffortLinkedIn
  description: Share marketing-approved posts to your own LinkedIn in one click.
  background_color: "#0a66c2"

features:
  bot_user:
    display_name: LowEffortLinkedIn
    always_online: true
  slash_commands:
    - command: /create-post
      url: https://YOUR-APP.up.railway.app/slack/events
      description: "Marketing only: create a shareable LinkedIn post bundle"
      should_escape: false
    - command: /disconnect
      url: https://YOUR-APP.up.railway.app/slack/events
      description: Disconnect your LinkedIn (add "all" to also erase share history)
      usage_hint: "[all]"
      should_escape: false
    - command: /advocacy-stats
      url: https://YOUR-APP.up.railway.app/slack/events
      description: Leaderboard of top sharers
      usage_hint: "[days, default 30]"
      should_escape: false

oauth_config:
  scopes:
    bot:
      - commands
      - chat:write
      - chat:write.public
      - reactions:write
      - im:write
      - files:read

settings:
  interactivity:
    is_enabled: true
    request_url: https://YOUR-APP.up.railway.app/slack/events
  org_deploy_enabled: false
  socket_mode_enabled: false
  token_rotation_enabled: false
