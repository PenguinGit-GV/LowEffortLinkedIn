name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          # Match the production image (Dockerfile: node:22-alpine) so CI
          # exercises the runtime that actually ships.
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm test
